name: CI

on:
  push:
    branches: [ production, main ]
  pull_request:
    branches: [ production, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [21, 23]
    concurrency:
      group: ci-${{ matrix.java-version }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Show Java version
        run: java -version

      - name: Build and run tests and package
        run: mvn --batch-mode -DskipTests=false package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade-processor-artifact-${{ matrix.java-version }}
          path: target/*.jar
          retention-days: 7
