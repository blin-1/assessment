name: CI

on:
  push:
    branches: [ production, main ]
  pull_request:
    branches: [ production, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Show Java version
        run: java -version

      - name: Build and run tests and package
        run: mvn --batch-mode -DskipTests=false package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade-processor-artifact
          path: target/*.jar
