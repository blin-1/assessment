apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-processor
  labels:
    app: trade-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-processor
  template:
    metadata:
      labels:
        app: trade-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: trade-processor
          image: ghcr.io/owner/assessment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
